name: Create release on tag

# Push a tag like v1.1.0 and this cuts the GitHub Release, stamps the
# bootstrap installer so its pinned default matches the tag, and attaches
# it as the `install-hyperfurion-vk.sh` asset that
# /releases/latest/download/... serves.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve the release tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG at $GITHUB_SHA"
      - name: Pin the bootstrap installer to this tag
        run: |
          sed -i "s|^VERSION=.*|VERSION=\"\${HYPERFURION_VK_VERSION:-${RELEASE_TAG}}\"|" \
            packaging/install-hyperfurion-vk.sh
          grep '^VERSION=' packaging/install-hyperfurion-vk.sh
      - name: Create the release with the installer asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On workflow_dispatch the tag may not exist yet; --target makes
          # gh create it at this commit.
          gh release create "$RELEASE_TAG" \
            packaging/install-hyperfurion-vk.sh \
            --target "$GITHUB_SHA" \
            --title "HyperFurion VK $RELEASE_TAG" \
            --generate-notes
